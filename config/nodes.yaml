# nova Node-Inventar
# ============================================================
# Quelle der Wahrheit fuer:
#   - cluster_status.sh (welche Worker pollen)
#   - cluster-Dokumentation (welcher Mac, welche Capability)
#   - kuenftige Dispatch-Logik (welcher Node fuer welchen Workload)
#
# Naming-Schema:
#   nova-hub       Control Plane (zentrales Hub, NICHT-Worker)
#   nova-w<N>      Worker, durchnumeriert ab 1, beliebig viele
#
# Capability-Tags sind frei waehlbar, dokumentiert in README.
# Aenderungen via git commit + push + node_deploy.sh.
# ============================================================

nodes:
  nova-hub:
    roles: [hub, worker]
    chip: x86_64
    ram_gb: 16
    os: macos-15
    tags: [compute-heavy, ib-capable, ib-host]
    notes: "MacMini Intel, Control Plane + Worker (TWS-Co-Location, ib-host)"

  nova-w1:
    roles: [worker]
    chip: arm64
    ram_gb: 16
    os: macos-15
    tags: [compute-heavy]
    notes: "MacbookPro M1 Apple Silicon, Editor und Worker"

  nova-w2:
    roles: [worker]
    chip: x86_64
    ram_gb: 8
    os: macos-15
    tags: [general, ib-capable]
    notes: "Old Macbook Intel, Clamshell-Modus, nur Worker"

  # Reserviert, noch nicht provisioniert:
  nova-w3:
    roles: [worker]
    chip: TBD
    ram_gb: 0
    os: TBD
    tags: []
    notes: "noch nicht provisioniert"

  nova-w4:
    roles: [worker]
    chip: TBD
    ram_gb: 0
    os: TBD
    tags: []
    notes: "noch nicht provisioniert"

  nova-w5:
    roles: [worker, llm_serve]
    chip: arm64
    ram_gb: 24
    os: macos-15
    tags: [compute-heavy, llm-host, metal-gpu]
    capabilities:
      llm_endpoint: "http://nova-w5.local:11434"     # Ollama HTTP-API (LAN-only)
      llm_models: [qwen2.5:14b-instruct-q4_K_M]      # initial; weitere per `ollama pull`
      llm_runtime: ollama
    notes: "MacMini M4 24GB Apple Silicon, LLM-Inference-Worker (Ollama). Metal-GPU braucht User-Session, daher LaunchAgent (nicht Daemon)."
