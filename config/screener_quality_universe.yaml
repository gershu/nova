# nova-lab Screener-Quality-Universum — 100 Qualitäts-Compounder.
#
# Auswahl-Prinzip:
#   - Dominante Marktposition im jeweiligen Segment (oft Marktführer/Duopol).
#   - Profitabilität bereits etabliert (kein "Wachstum-um-jeden-Preis").
#   - Verständliches Geschäftsmodell (Stefan-Kompetenzkreis).
#   - Mix aus Quality-Value (etabliert, defensiv) und Quality-Growth
#     (säkulares Tailwind, hohe Margen, expandierend).
#
# Sektor-Tilt:                       Bewusst ausgespart:
#   Tech/Semis    34 Namen            - Energie/Öl & Gas (zyklisch, kein Moat)
#   Healthcare    21                  - Versorger / Utilities
#   Financials    15                  - REITs (kein Compounder-Profil)
#   Consumer Disc 10                  - Reine Banken außer JPM (zyklisch)
#   Consumer Staples 8                - Auto-OEMs, Airlines (zyklisch)
#   Industrials    8                  - China-Listings (Regulierungs-Risiko)
#   Comm Services  3                  - Crypto-/Fintech-Spekulationen
#   Materials      1
#
# Pflege:
#   - Stefan reviewt + ergänzt/streicht. Quartalsweise Sanity-Check empfohlen
#     (Index-Komitees ändern S&P 500 ~5-10× p.a.).
#   - Symbol-Format = US-Ticker (yfinance-kompatibel). ADRs sind als
#     US-Notierung in USD geführt (ASML, TSM, NVO, SAP, ARM…).
#   - Format kompatibel zu config/universe_sp500.yaml; zusätzlich pro Eintrag
#     ein 'note'-Feld mit der Auswahl-Begründung (eine Zeile).
#
# Init-Flow (nach Review):
#   1. modules.screener init  → seedet ref_instruments + Watchlist
#      'quality_universe'.
#   2. lab.fundamentals (wöchentlich) nimmt sie automatisch in den
#      Fundamentals-Snapshot.
#   3. python -m modules.sec_filings backfill-all --watchlist
#      quality_universe --quarters 20  → GuV-Historie.

