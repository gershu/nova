# Konfiguration fuer den Ad-Hoc Gesamt-Qualitaets-Score
# (modules/dashboard/views/ad_hoc.py).
#
# Aenderungen hier wirken sofort (Dashboard-Reload), ohne Code-Aenderung.
# Fehlt diese Datei oder einzelne Schluessel, greifen die Defaults im Code.

# Gewichte je Thema fuer den 0-100-Gesamtscore. Themen ohne Daten werden
# ausgeklammert und die verbleibenden Gewichte renormiert.
weights:
  return_on_capital: 0.30
  balance_sheet:     0.25
  stock_based_comp:  0.20
  gaap_vs_non_gaap:  0.15
  insider:           0.10

# Ampel-Grenzen fuer den Gesamtscore (>= strong gruen, >= mixed gelb,
# darunter rot).
bands:
  strong: 70
  mixed:  40

# Schwellenwerte je Kriterium. Anteile/Quoten als Dezimalbruch
# (0.15 = 15 %).
thresholds:
  balance_sheet:
    current_ratio_min:  1.5
    debt_to_equity_max: 0.5
    equity_ratio_min:   0.40
  return_on_capital:
    roic_min: 0.15
    roe_min:  0.15
    roa_min:  0.06
  stock_based_comp:
    sbc_to_revenue_max: 0.05
    sbc_to_cfo_max:     0.15
    dilution_cagr_max:  0.01
  gaap_vs_non_gaap:
    mentions_max:   15
    categories_max: 3
  insider:
    cluster_buyers_min: 3

# Insider Conviction Score: gewichtet aussagekraeftige Signale. Routine-
# Verkaeufe (10b5-1-Handelsplaene) zaehlen NICHT als bearish. Netto-Punkte
# -> Bullisch/Neutral/Bearisch.
insider_conviction:
  weights:
    ceo_buy:         35     # CEO-Kauf (Markt)
    cfo_buy:         25     # CFO-Kauf (Markt)
    cluster_buy:     20     # >= cluster_buyers_min verschiedene Kaeufer
    first_buy:       15     # Erstkauf eines Insiders im Zeitraum
    meaningful_sell: 25     # bedeutender Verkauf (abgezogen)
  cluster_buyers_min: 3
  meaningful_sell_pct: 0.20  # verkaufter Anteil der Holdings -> bedeutend
  signal:
    bullish_min:  35       # Netto-Punkte >= -> bullisch
    bearish_max: -20       # Netto-Punkte <= -> bearisch; dazwischen neutral

# ---------------------------------------------------------------------
# Moat-Score (eigenstaendig, separater Modus). Sechs Teil-Signale,
# jedes 0..1; gewichteter Mittelwert -> 0-100. Nicht auswertbare
# Signale (z.B. keine F&E) werden ausgeklammert und renormiert.
moat:
  weights:
    gross_margin_trend:  0.22
    roic_stability:      0.22
    fcf_margin:          0.18
    rnd_efficiency:      0.13
    market_share_proxy:  0.15
    buybacks:            0.10
  bands:
    strong: 70
    mixed:  40
  thresholds:
    gross_margin:
      improve_pp: 1.0      # Margenanstieg in %-Punkten -> Score 1
      stable_pp: -1.0      # >= stable_pp (aber < improve) -> Score 0.5
    roic_stability:
      mean_min: 0.12       # mittleres ROIC fuer vollen Level-Score
      cv_max:   0.35       # Variationskoeffizient (stdev/mean) Obergrenze
    fcf_margin:
      high: 0.15
      mid:  0.05
    rnd_efficiency:
      high: 1.5            # Umsatzzuwachs je kumul. F&E-Dollar (Periode) -> 1
      mid:  0.5            # >= mid -> 0.5
    market_share_proxy:
      rev_cagr_high: 0.10  # Umsatz-CAGR als Proxy fuer Anteilsgewinne
      rev_cagr_mid:  0.03
    buybacks:
      shrink_cagr: -0.01   # Aktien-CAGR <= -1 % p.a. -> Rueckkauf (1)
      dilute_cagr:  0.01   # >= +1 % p.a. -> Verwaesserung (0)
