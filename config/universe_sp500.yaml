# Static S&P 500 Universe für modules.screener_value.
#
# Pflege: manuell. S&P 500 ändert sich ~5-10× pro Jahr durch Index-Komitee;
# diese YAML ist Snapshot, nicht Live-Source. Quarterly-Review empfohlen:
#   - Aktuelle Mitgliedschaft via https://en.wikipedia.org/wiki/List_of_S%26P_500_companies
#   - Diffs anpassen, commit + push + node_deploy.sh
#
# Starter-Set: Top ~60 nach Market Cap (Q1-2026 Schätzung), repräsentativ
# über Sektoren. Stefan kann auf volle 500 erweitern.
#
# Format: Liste von Objekten mit symbol + name (+ optional sector).
# 'symbol' ist das yfinance-Ticker-Format (BRK.B -> BRK-B Mapping macht
# der yf_adapter via _candidate_tickers).

