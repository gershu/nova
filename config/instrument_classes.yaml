# nova — Instrument -> Allokations-Klasse Zuordnung.
#
# Ordnet jede ref_instrument_id einer der Klassen aus config/allocation.yaml
# (target_allocation) zu. modules/allocation invertiert diese Map und
# aggregiert v_mkt_holdings je Klasse.
#
# Die Klassen-Schluessel muessen EXAKT den Schluesseln in allocation.yaml
# entsprechen. Instrumente ohne Eintrag landen im Bucket 'unclassified' und
# werden vom Modul laut gemeldet — dann hier ergaenzen.
#
# Gruppiert nach Klasse zur Lesbarkeit; tunebar ohne Code-Deploy.
# Stand: 2026-05-22 — geseedet aus dem damaligen Portfolio (29 Instrumente).

