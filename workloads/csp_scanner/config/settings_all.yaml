# =============================================================================
# Scanner Settings
# =============================================================================

# ---- Interactive Brokers connection -----------------------------------------
ib:
  host: "127.0.0.1"
  port: 4002           # 7497 = TWS Paper, 7496 = TWS Live, 4002 = Gateway Paper, 4001 = Gateway Live
  client_id: 1
  market_data_type: 2  # 1=live, 2=frozen, 3=delayed, 4=delayed-frozen.
                       # Use 3 for development without live subscriptions.
  request_timeout_s: 15

# ---- Option universe & filters ----------------------------------------------
options:
  # Range of days-to-expiration to consider per ticker.
  dte_min: 60
  dte_max: 720

  # Only consider monthly + weekly listings? "all" keeps everything that IB returns.
  expiry_filter: "monthlies"   # "all" | "monthlies"

  # Maximum acceptable Bid/Ask spread, in % of mid price.
  # Spread% = (Ask - Bid) / Mid. Strikes above this are dropped.
  max_spread_pct: 100.0

  # Drop any quote where bid is missing/zero (illiquid / no market).
  require_positive_bid: true

  # Minimum annualized premium yield to keep in the report (filter, not target).
  # Yield = (Mid * 100) / (Strike * 100) * 365 / DTE  =  Mid / Strike * 365 / DTE
  min_annualized_yield: 0.00   # 5% p.a.

  # How many top puts per ticker to keep in the per-ticker detail sheet.
  top_n_per_ticker: 25

# ---- T-Bill matching --------------------------------------------------------
tbill:
  # IB symbol/exchange for US Treasury Bills. Bills are quoted on SMART by CUSIP
  # in IB; for a generic discovery we map each candidate's expiry to the nearest
  # T-Bill maturity bucket and price an indicative yield off that.
  enabled: true
  # Maturity buckets used for matching (in days). The scanner picks the largest
  # bucket whose maturity is <= the option's DTE; remainder is held overnight.
  buckets_days: [28, 91, 182, 364]
  # Optional fallback yield (decimal) if IB cannot return a live T-Bill quote.
  fallback_yield: 0.04

# ---- Data store (DuckDB) ----------------------------------------------------
store:
  enabled: true
  db_path: "data/csp_history.duckdb"   # relative to project root

# ---- Reporting --------------------------------------------------------------
report:
  output_dir: "output"
  filename_prefix: "csp_scan"
  open_after_run: false
