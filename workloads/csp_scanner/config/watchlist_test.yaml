# =============================================================================
# Watchlist for Cash-Secured Short Put Scanner
# =============================================================================
# Fields:
#   symbol        : IB ticker.
#   stk_exchange  : Exchange für Stock-Qualifizierung. "SMART" = IB Smart Routing.
#   opt_exchange  : Exchange für Options-Fetch. US-Aktien: "SMART".
#                   Europäische Aktien: z.B. "EUREX".
#   trading_class : IB Trading Class (optional). Leer = automatisch von IB.
#   currency      : Währung des Underlyings ("USD" oder "EUR").
#   max_strike    : Höchster Strike, den der Scanner berücksichtigt.
#   max_contracts : Maximale Kontraktzahl pro Underlying (informativ).
#   notes         : Freitext-Kommentar.
# =============================================================================

watchlist:
#  - symbol: QQQ
#    stk_exchange: SMART
#    opt_exchange: SMART
#    currency: USD
#    max_strike: 650.0
#    max_contracts: 20
#    notes: "NASDAQ-ETF"
  - symbol: SPY
    stk_exchange: SMART
    opt_exchange: SMART
    currency: USD
    max_strike: 700.0
    max_contracts: 20
    notes: "S&P-ETF"

